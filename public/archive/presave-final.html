<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SINE NOCTIS — Premiere</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Big Caesar';
    src: url('/fonts/BigCaesar_2.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Franklin Gothic M';
    src: url('/fonts/FranklinGothicMedium.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  :root {
    --black: #050505;
    --ticket-bg: rgba(8,7,6,0.88);
    --cream: #e8e4dc;
    --dim: rgba(232,228,220,0.45);
    --faint: rgba(232,228,220,0.18);
    --ghost: rgba(232,228,220,0.08);
    --perf: rgba(232,228,220,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Franklin Gothic M', 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 35%;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 70% at 50% 40%, transparent 0%, rgba(5,5,5,0.7) 70%, rgba(5,5,5,0.95) 100%),
      linear-gradient(to bottom, rgba(5,5,5,0.55) 0%, rgba(5,5,5,0.35) 40%, rgba(5,5,5,0.75) 100%);
  }

  /* ── CONTENT ── */
  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 60px 20px 80px;
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 48px;
    text-align: center;
  }

  .eyebrow span {
    margin: 0 8px;
    opacity: 0.35;
  }

  /* ── TICKET ── */
  .ticket {
    display: grid;
    grid-template-columns: 1fr 140px;
    background: var(--ticket-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--ghost);
    position: relative;
    overflow: hidden;
  }

  .ticket::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .ticket-main {
    padding: 48px 44px 44px;
    position: relative;
    z-index: 1;
  }

  .venue-line {
    font-size: 8.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 36px;
  }

  .ticket-title {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 38px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 10px;
  }

  .ticket-subtitle {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    color: var(--dim);
    letter-spacing: 0.03em;
    margin-bottom: 40px;
  }

  .ticket-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--ghost);
    padding-top: 20px;
  }

  .detail { padding-right: 16px; }

  .detail-label {
    font-size: 7.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 6px;
  }

  .detail-value {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--dim);
  }

  .detail-value.tbd {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--faint);
  }

  /* ── SERIAL ── */
  .ticket-serial {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--ghost);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .serial-label {
    font-size: 7px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.1);
  }

  .serial-number {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: rgba(232,228,220,0.15);
  }

  /* ── SHOWING BADGE ── */
  .showing-badge {
    display: none;
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(232,228,220,0.06);
    border: 1px solid var(--faint);
    padding: 5px 14px;
    margin-bottom: 36px;
  }

  .released .showing-badge { display: inline-block; }
  .released .venue-line { display: none; }

  /* ── PERFORATION ── */
  .perforation {
    position: absolute;
    right: 140px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: repeating-linear-gradient(
      to bottom,
      var(--perf) 0px,
      var(--perf) 6px,
      transparent 6px,
      transparent 12px
    );
    z-index: 2;
    transition: opacity 0.6s ease;
  }

  .perforation::before,
  .perforation::after {
    content: '';
    position: absolute;
    left: -8px;
    width: 16px;
    height: 16px;
    background: var(--black);
    border-radius: 50%;
    border: 1px solid var(--ghost);
    transition: opacity 0.6s ease;
  }
  .perforation::before { top: -8px; }
  .perforation::after { bottom: -8px; }

  .released .perforation { opacity: 0; }

  /* ── STUB ── */
  .ticket-stub {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    background: rgba(232,228,220,0.015);
    transition: opacity 0.5s ease;
  }

  .admit {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 8px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 28px;
  }

  .stub-number {
    font-family: 'Cormorant', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--faint);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stub-label {
    font-size: 7px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.1);
  }

  .stub-owjv {
    margin-top: 28px;
    width: 18px;
    height: 18px;
    opacity: 0.12;
  }

  .released .ticket-stub { opacity: 0; pointer-events: none; }

  /* ── TEAR REVEAL ── */
  .tear-reveal {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 141px;
    z-index: 3;
    overflow: hidden;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
  }

  .released .tear-reveal {
    opacity: 1;
    transform: translateX(0);
  }

  .tear-reveal-img {
    position: absolute;
    inset: 0;
  }

  .tear-reveal-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 25%;
  }

  .tear-reveal-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(5,5,5,0.85) 0%, rgba(5,5,5,0.4) 40%, rgba(5,5,5,0.3) 100%),
      linear-gradient(to bottom, rgba(5,5,5,0.3) 0%, transparent 30%, transparent 70%, rgba(5,5,5,0.4) 100%);
  }

  .tear-reveal::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 0;
    bottom: 0;
    width: 6px;
    z-index: 2;
    background: linear-gradient(to right, var(--black) 0%, transparent 100%);
  }

  .tear-reveal .stream-links {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 18px;
  }

  .stream-links a {
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.7);
    text-decoration: none;
    border-bottom: 1px solid rgba(232,228,220,0.2);
    padding-bottom: 2px;
    transition: all 0.2s ease;
  }

  .stream-links a:hover {
    color: var(--cream);
    border-bottom-color: rgba(232,228,220,0.5);
  }

  /* ── CTA AREA ── */
  .cta-area {
    margin-top: 28px;
    text-align: center;
  }

  .cta-btn {
    display: inline-block;
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--cream);
    padding: 14px 52px;
    border: none;
    cursor: pointer;
    transition: all 0.4s ease;
  }

  .cta-btn:hover { background: rgba(232,228,220,0.88); }

  .cta-note {
    margin-top: 14px;
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--faint);
    transition: opacity 0.3s ease;
  }

  /* ── EMAIL INPUT ── */
  .email-form {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    animation: fadeUp 0.4s ease-out both;
  }

  .email-form.visible { display: flex; }

  .email-input {
    width: 100%;
    max-width: 340px;
    padding: 13px 18px;
    background: transparent;
    border: 1px solid rgba(232,228,220,0.12);
    color: var(--cream);
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .email-input::placeholder {
    color: rgba(232,228,220,0.2);
  }

  .email-input:focus {
    border-color: rgba(232,228,220,0.3);
  }

  .email-submit {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--cream);
    padding: 14px 52px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .email-submit:hover { background: rgba(232,228,220,0.88); }
  .email-submit:disabled { opacity: 0.4; cursor: default; }

  /* ── CONFIRMED STATE ── */
  .confirmed-msg {
    display: none;
    margin-top: 28px;
    text-align: center;
    animation: fadeUp 0.4s ease-out both;
  }

  .confirmed-msg.visible { display: block; }

  .confirmed-text {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.5);
    padding: 14px 52px;
    border: 1px solid rgba(232,228,220,0.15);
  }

  .confirmed-note {
    margin-top: 14px;
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--faint);
  }

  .fine-print {
    margin-top: 40px;
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.08);
    text-align: center;
  }

  /* ── STATE TOGGLE ── */
  .toggle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
    background: rgba(5,5,5,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--ghost);
  }

  .toggle-label {
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .toggle-btn {
    font-family: 'Franklin Gothic M', sans-serif;
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid var(--ghost);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .toggle-btn:hover {
    border-color: var(--faint);
    color: var(--cream);
  }

  .toggle-btn.active {
    background: rgba(232,228,220,0.08);
    border-color: var(--faint);
    color: var(--cream);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .content { padding: 40px 16px 100px; }

    .ticket {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
    }

    .ticket-main { padding: 36px 28px 32px; }
    .ticket-title { font-size: 26px; letter-spacing: 0.14em; }
    .ticket-subtitle { font-size: 15px; margin-bottom: 32px; }

    .ticket-details {
      grid-template-columns: 1fr 1fr;
      gap: 16px 0;
    }

    .detail:nth-child(3) { grid-column: 1 / -1; }

    .perforation {
      right: auto; top: auto;
      left: 0; right: 0; bottom: auto;
      width: auto; height: 1px;
      position: relative;
      background: repeating-linear-gradient(
        to right,
        var(--perf) 0px,
        var(--perf) 6px,
        transparent 6px,
        transparent 12px
      );
    }

    .perforation::before,
    .perforation::after { top: -8px; left: auto; }
    .perforation::before { left: -8px; top: -8px; }
    .perforation::after { right: -8px; left: auto; top: -8px; }

    .ticket-stub {
      flex-direction: row;
      padding: 24px 28px;
      gap: 20px;
    }

    .admit { writing-mode: horizontal-tb; margin-bottom: 0; }
    .stub-owjv { margin-top: 0; margin-left: auto; }

    .tear-reveal {
      width: auto;
      height: 120px;
      right: 0; left: 0;
      top: auto; bottom: 0;
      transform: translateY(8px);
    }

    .released .tear-reveal { transform: translateY(0); }

    .tear-reveal-img img { object-position: 50% 30%; }

    .tear-reveal::before {
      left: 0; right: 0;
      top: -1px; bottom: auto;
      width: auto; height: 6px;
      background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
    }

    .tear-reveal .stream-links {
      flex-direction: row;
      gap: 24px;
    }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .bg { animation: fadeIn 1.2s ease-out 0s both; }
  .eyebrow { animation: fadeIn 0.8s ease-out 0.2s both; }
  .ticket { animation: fadeUp 1s ease-out 0.3s both; }
  .cta-area { animation: fadeUp 0.8s ease-out 0.7s both; }
  .fine-print { animation: fadeIn 0.6s ease-out 1s both; }
</style>
</head>
<body>

  <div class="bg">
    <img src="/images/sn-presave-bg2.jpg" alt="">
  </div>

  <div class="content">

    <div class="eyebrow">
      Other World Cinema <span>&middot;</span> Premiere Screening
    </div>

    <div class="ticket" id="ticket">
      <div class="ticket-main">
        <div class="showing-badge">Now Showing</div>
        <div class="venue-line">Presented at no cost</div>
        <div class="ticket-title">SINE NOCTIS</div>
        <div class="ticket-subtitle">A film</div>
        <div class="ticket-details">
          <div class="detail">
            <div class="detail-label">Date</div>
            <div class="detail-value tbd" id="date-value">to be announced</div>
          </div>
          <div class="detail">
            <div class="detail-label">Format</div>
            <div class="detail-value">EP &middot; 3 Tracks</div>
          </div>
          <div class="detail">
            <div class="detail-label">Admission</div>
            <div class="detail-value">FREE Admission</div>
          </div>
        </div>
        <div class="ticket-serial">
          <span class="serial-label">No.</span>
          <span class="serial-number">6958</span>
        </div>
      </div>

      <div class="perforation"></div>

      <div class="ticket-stub">
        <div class="admit">Admit One</div>
        <div class="stub-number">II</div>
        <div class="stub-label">Act</div>
        <img class="stub-owjv" src="/images/owjv-cherub-transparent.png" alt="">
      </div>

      <div class="tear-reveal">
        <div class="tear-reveal-img">
          <img src="/images/sn-presave-bg.jpg" alt="">
        </div>
        <div class="stream-links">
          <a href="#">Spotify</a>
          <a href="#">Apple Music</a>
          <a href="#">Tidal</a>
        </div>
      </div>
    </div>

    <!-- Pre-save: Step 1 — button -->
    <div class="cta-area" id="cta-step1">
      <button class="cta-btn" onclick="showEmailForm()">Reserve Your Seat</button>
      <div class="cta-note">you'll know when it's dark.</div>
    </div>

    <!-- Pre-save: Step 2 — email input -->
    <form class="email-form" id="cta-step2" onsubmit="submitEmail(event)">
      <input
        type="email"
        class="email-input"
        id="email-input"
        placeholder="your email"
        required
        autocomplete="email"
      >
      <button type="submit" class="email-submit" id="email-submit">Confirm Reservation</button>
    </form>

    <!-- Pre-save: Step 3 — confirmed -->
    <div class="confirmed-msg" id="cta-step3">
      <div class="confirmed-text">Seat Reserved</div>
      <div class="confirmed-note">see you opening night.</div>
    </div>

    <div class="fine-print">OWJV</div>

  </div>

  <!-- Preview toggle -->
  <div class="toggle-bar">
    <div class="toggle-label">Preview</div>
    <button class="toggle-btn active" id="btn-pre" onclick="setState('pre')">Pre-Release</button>
    <button class="toggle-btn" id="btn-post" onclick="setState('post')">Now Showing</button>
  </div>

<script>
  function showEmailForm() {
    document.getElementById('cta-step1').style.display = 'none';
    document.getElementById('cta-step2').classList.add('visible');
    document.getElementById('email-input').focus();
  }

  async function submitEmail(e) {
    e.preventDefault();
    const input = document.getElementById('email-input');
    const btn = document.getElementById('email-submit');
    const email = input.value.trim();
    if (!email) return;

    btn.disabled = true;
    btn.textContent = '...';

    try {
      await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, source: 'presave' })
      });
    } catch (err) {
      // Still show confirmation — don't leave them hanging
    }

    document.getElementById('cta-step2').style.display = 'none';
    document.getElementById('cta-step3').classList.add('visible');
  }

  function setState(state) {
    const ticket = document.getElementById('ticket');
    const dateVal = document.getElementById('date-value');
    const btnPre = document.getElementById('btn-pre');
    const btnPost = document.getElementById('btn-post');
    const step1 = document.getElementById('cta-step1');
    const step2 = document.getElementById('cta-step2');
    const step3 = document.getElementById('cta-step3');

    if (state === 'post') {
      ticket.classList.add('released');
      dateVal.textContent = 'Spring 2026';
      dateVal.classList.remove('tbd');
      step1.style.display = 'none';
      step2.style.display = 'none';
      step2.classList.remove('visible');
      step3.classList.remove('visible');
      step3.style.display = 'none';
      // Show a "listen" CTA instead
      step1.style.display = 'block';
      step1.querySelector('.cta-btn').textContent = 'LISTEN NOW';
      step1.querySelector('.cta-btn').onclick = null;
      step1.querySelector('.cta-note').textContent = 'free is available.';
      btnPost.classList.add('active');
      btnPre.classList.remove('active');
    } else {
      ticket.classList.remove('released');
      dateVal.textContent = 'to be announced';
      dateVal.classList.add('tbd');
      step1.style.display = 'block';
      step1.querySelector('.cta-btn').textContent = 'RESERVE YOUR SEAT';
      step1.querySelector('.cta-btn').onclick = showEmailForm;
      step1.querySelector('.cta-note').textContent = "you\u2019ll know when it\u2019s dark.";
      step2.style.display = 'none';
      step2.classList.remove('visible');
      step3.classList.remove('visible');
      step3.style.display = 'none';
      btnPre.classList.add('active');
      btnPost.classList.remove('active');
    }
  }
</script>

</body>
</html>
